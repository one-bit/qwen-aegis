description = "Verify tool installation and framework integrity"

prompt = """
You are executing the `/aegis.validate` command — Verify tool installation and framework integrity.

This is primarily a READ-ONLY command with tool detection via shell commands.

## Step 1: Verify Framework Installation

Check that the AEGIS framework is properly installed:
- Verify `.aegis/` directory exists in the current project (or inform user to run /aegis.init first)
- Check `STATE.md` exists and is well-formed
- Check `MANIFEST.md` exists
- Verify `findings/` directory exists

## Step 2: Verify All 8 OSS Tools

Test each tool:

| Tool | Detection Method |
|------|-----------------|
| SonarQube | `command -v sonar-scanner` OR `podman image inspect sonarsource/sonar-scanner-cli` |
| Semgrep | `command -v semgrep` OR `~/.local/share/aegis/venvs/semgrep/bin/semgrep` |
| Trivy | `command -v trivy` |
| Gitleaks | `command -v gitleaks` |
| Checkov | `command -v checkov` OR `~/.local/share/aegis/venvs/checkov/bin/checkov` |
| Syft | `command -v syft` |
| Grype | `command -v grype` |
| Git | `command -v git` |

For each tool, record: detected/not found, location path.

## Step 3: Verify Project State

If `.aegis/` exists:
- Check STATE.md structure (required sections present)
- Check MANIFEST.md structure (framework info, tool table)
- List findings count if any exist in `.aegis/findings/`

## Step 4: Display Validation Report

```
════════════════════════════════════════
AEGIS VALIDATION REPORT
════════════════════════════════════════

Framework: [OK / ISSUES]
  STATE.md: [present / missing]
  MANIFEST.md: [present / missing]
  findings/: [present / missing]

────────────────────────────────────────
TOOL INVENTORY
────────────────────────────────────────

┌────────────┬───────────────┬──────────────────────────────────┐
│ Tool       │ Status        │ Location                         │
├────────────┼───────────────┼──────────────────────────────────┤
│ SonarQube  │ [detected/NA] │ [path or n/a]                    │
│ Semgrep    │ [detected/NA] │ [path]                           │
│ Trivy      │ [detected/NA] │ [path]                           │
│ Gitleaks   │ [detected/NA] │ [path]                           │
│ Checkov    │ [detected/NA] │ [path]                           │
│ Syft       │ [detected/NA] │ [path]                           │
│ Grype      │ [detected/NA] │ [path]                           │
│ Git        │ [detected/NA] │ [path]                           │
└────────────┴───────────────┴──────────────────────────────────┘

Tools: [X]/8 detected

────────────────────────────────────────
[If tools missing:]
MISSING TOOLS
[Instructions for installing each missing tool]

[If all tools detected:]
All tools detected ✓
════════════════════════════════════════
```

Use read_file, run_shell_command, glob, and grep_search tools only.
"""
