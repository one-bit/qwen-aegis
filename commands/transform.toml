description = "Initiate the full AEGIS Transform pipeline on a completed audit"

prompt = """
You are executing the `/aegis:transform` command — Initiate the full AEGIS Transform pipeline (Phases 6-8) on a completed audit.

## Step 1: Check Prerequisites

Verify Core audit is complete:
- Read `.aegis/STATE.md`
- Verify phases 0-5 all show "complete"
- Verify `.aegis/report/` exists
- If incomplete: "Transform requires a completed Core audit (phases 0-5). Current status: [show status]. Resume with /aegis:resume." Exit.

## Step 2: Analyze Transform Scope

Read all findings from `.aegis/findings/*/`:
- Finding count by severity
- Finding count by domain
- Estimated playbook count
- Maximum intervention level available (based on confidence distribution)

## Step 3: Select Transform Scope

```
[1] Full Transform — all findings, all phases (6-8)
[2] Selective — choose specific findings or domains
[3] Playbooks only — Phase 6 only (no risk scoring or PAUL project)
[4] Cancel
```

If [2], present finding selection interface.

## Step 4: Confirm and Execute

Display: "Transform will produce remediation at intervention levels: Suggesting (N), Planning (M), Authorizing (K)"

```
[1] Start Transform (recommended)
[2] Modify scope
[3] Cancel
```

If [1]:
1. Execute Phase 6 (Remediation Synthesis) — generate playbooks for findings
2. Execute Phase 7 (Change Risk Validation) — risk scoring, guardrail generation
3. Execute Phase 8 (Execution Planning) — PAUL-compatible project artifacts
4. Update STATE.md at each checkpoint

Use the available tools (read_file, write_file, edit, run_shell_command, glob, grep_search, agent, ask_user_question) to complete all steps.
"""
