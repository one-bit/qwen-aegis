description = "Run a full or targeted AEGIS diagnostic audit on a codebase"

prompt = """
You are executing the `/aegis.audit` command — Run a full or targeted AEGIS diagnostic audit.

## Step 1: Determine Target Repository

Check if user provided a path in arguments:
- If YES: use provided path
- If NO: use current working directory

Validate: path exists, is a directory, has `.git/` (warn if not).

## Step 2: Check for Existing Audit

Check if `.aegis/STATE.md` exists:
- If YES: "An audit already exists. Resume with /aegis.resume or start fresh." Exit.
- If NO: proceed to Step 3

## Step 3: Analyze Repository

Display:
- Repository path
- Detected languages/frameworks (check package.json, requirements.txt, Cargo.toml, go.mod, pom.xml, etc.)
- Repository size estimate

## Step 4: Present Audit Scope Options

```
[1] Full audit — all phases, all domains (recommended for first run)
[2] Targeted audit — select specific domains
[3] Quick scan — phases 0-2 only (reconnaissance + domain audits, no synthesis)
[4] Cancel
```

If [2], present domain checklist for selection (domains 00-13).

## Step 5: Confirm and Execute

Display audit plan:
- Scope (full / targeted / quick)
- Phases to execute
- Estimated session count
- Domains included

```
[1] Start audit (recommended)
[2] Modify scope
[3] Cancel
```

If [1]:
1. Create `.aegis/` directory structure if not exists
2. Initialize `.aegis/STATE.md` with audit start state
3. Initialize `.aegis/MANIFEST.md` with tool inventory
4. Begin Phase 0 by delegating to the phase-0-context workflow using the agent tool
5. Progress through phases sequentially, updating STATE.md at each checkpoint

Use the available tools (read_file, write_file, edit, run_shell_command, glob, grep_search, agent, ask_user_question) to complete all steps.
"""
