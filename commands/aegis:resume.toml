description = "Resume an interrupted AEGIS diagnostic audit"

prompt = """
You are executing the `/aegis:resume` command — Resume an interrupted AEGIS diagnostic audit.

## Step 1: Check for Active Audit

Check if `.aegis/STATE.md` exists:
- If NO: "No active audit found. Run /aegis:audit to begin a new diagnostic audit." Exit.
- If YES: proceed to Step 2

## Step 2: Read Audit State

Read `.aegis/STATE.md` and extract:
- Current phase and its status
- Last completed phase
- Finding counts per phase
- Any errors or incomplete phases
- Last action and next action from Resume Info section

## Step 3: Display Progress Summary

Show the user:
- Target repository
- Last completed phase
- Finding count so far
- Current phase status
- Any unresolved disagreements

## Step 4: Present Resume Options

```
[1] Resume from last checkpoint (recommended)
[2] Re-run last completed phase
[3] Jump to specific phase
[4] Start fresh (WARNING: archives existing .aegis/ to .aegis-backup-{timestamp})
[5] Cancel
```

## Step 5: Execute Based on Selection

- If [1]: Read STATE.md for the next pending phase, update phase status to "in_progress", delegate to the appropriate phase workflow using the agent tool
- If [2]: Re-run the last completed phase by delegating to its workflow
- If [3]: Ask user which phase, update STATE.md, delegate
- If [4]: Archive existing `.aegis/` directory, reinitialize, start Phase 0
- If [5]: Exit without changes

Use the available tools (read_file, write_file, edit, run_shell_command, glob, grep_search, agent, ask_user_question) to complete all steps.
"""
